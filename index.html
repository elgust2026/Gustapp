<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gust AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">
    <div id="app" class="max-w-md mx-auto bg-white p-6 rounded-3xl shadow-lg">
        <h1 class="text-xl font-bold mb-4">Analizador AI</h1>
        <textarea id="ai-input" class="w-full p-4 border rounded-2xl h-24 mb-4" placeholder="Describe tu comida..."></textarea>
        <button onclick="runAiAnalysis()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-bold">ANALIZAR COMIDA</button>
        <div id="result" class="mt-4 p-4 bg-purple-50 rounded-2xl hidden"></div>
    </div>

    <script>
        // API Key integrada para evitar errores de almacenamiento
        const API_KEY = "AIzaSyAh36lin69cn-uJnnynZMRksMyVZwUcNPI"; 

        async function runAiAnalysis() {
            const input = document.getElementById('ai-input').value;
            const resDiv = document.getElementById('result');
            resDiv.classList.remove('hidden');
            resDiv.innerText = "Analizando...";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Analiza esta comida: "${input}". Devuelve solo JSON: {"name": "...", "cal": 0, "prot": 0}` }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const json = JSON.parse(text);
                resDiv.innerHTML = `<strong>${json.name}</strong><br>Calorías: ${json.cal}<br>Proteína: ${json.prot}g`;
            } catch (e) {
                resDiv.innerText = "Error: La API Key no pudo conectar.";
            }
        }
    </script>
</body>
</html>
