<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gust AI - Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,1,0" />
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FDFBFF; color: #1C1B1F; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(202, 196, 208, 0.4); }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
        input:focus { outline: none; border-color: #6750A4; }
        .tab-active { background-color: #E8DEF8; color: #1D192B; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">
    <div id="app" class="flex flex-col h-full w-full max-w-md mx-auto relative shadow-2xl bg-[#FDFBFF]">
        <header class="px-6 pt-12 pb-4 flex justify-between items-center bg-[#FDFBFF]">
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-[#1C1B1F]">Hola, <span id="display-name">Alex</span></h1>
                <p class="text-[#49454F] text-sm">Meta: <span id="display-goal">Recomposición</span></p>
            </div>
            <div id="avatar" class="w-12 h-12 rounded-full bg-[#D0BCFF] flex items-center justify-center text-[#381E72] font-bold shadow-sm">AM</div>
        </header>

        <main id="main-content" class="flex-1 px-4 space-y-4 overflow-y-auto pb-32">
            <div class="bg-[#F3EDF7] rounded-3xl p-6 shadow-sm">
                <div class="flex justify-between items-end mb-6">
                    <div>
                        <p class="text-sm text-[#49454F] mb-1">Calorías Restantes</p>
                        <h2 class="text-5xl font-light text-[#1D1B20]"><span id="cal-remaining">2000</span> <span class="text-lg text-[#49454F]">kcal</span></h2>
                    </div>
                    <div class="w-20 h-20 relative flex items-center justify-center">
                        <svg class="w-full h-full"><circle cx="40" cy="40" r="35" stroke="#E7E0EC" stroke-width="6" fill="transparent" /><circle id="progress-circle" cx="40" cy="40" r="35" stroke="#6750A4" stroke-width="6" fill="transparent" class="progress-ring" stroke-dasharray="219.9" stroke-dashoffset="219.9" /></svg>
                        <span id="progress-percent" class="absolute text-xs font-bold">0%</span>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="bg-white rounded-2xl p-3 flex flex-col items-center shadow-sm"><span class="text-[9px] font-bold text-[#6750A4] uppercase">Proteína</span><p class="text-lg font-bold"><span id="prot-current">0</span>g</p></div>
                    <div class="bg-white rounded-2xl p-3 flex flex-col items-center shadow-sm"><span class="text-[9px] font-bold text-[#6750A4] uppercase">Carbos</span><p class="text-lg font-bold"><span id="carb-current">0</span>g</p></div>
                    <div class="bg-white rounded-2xl p-3 flex flex-col items-center shadow-sm"><span class="text-[9px] font-bold text-[#6750A4] uppercase">Grasas</span><p class="text-lg font-bold"><span id="fat-current">0</span>g</p></div>
                </div>
            </div>
            <div id="logs-container" class="space-y-3 pb-10"></div>
        </main>

        <div id="scan-screen" class="hidden absolute inset-0 bg-white z-50 flex flex-col p-6">
            <div class="flex justify-between mb-6"><h2 class="text-xl font-bold">Analizador AI</h2><button onclick="closeScan()" class="material-symbols-outlined">close</button></div>
            <textarea id="ai-input" class="w-full p-4 border rounded-2xl h-24 text-sm" placeholder="Ej: 5 huevos y 2 salchichas..."></textarea>
            <button id="analyze-btn" onclick="runAiAnalysis()" class="w-full mt-4 bg-[#6750A4] text-white py-4 rounded-2xl font-bold">ANALIZAR</button>
            <div id="loading-ai" class="hidden py-10 text-center">Analizando...</div>
            <div id="ai-result" class="hidden mt-6 bg-[#F3EDF7] p-6 rounded-3xl border-2 border-[#6750A4]">
                <h4 id="result-name" class="text-center font-bold text-lg"></h4>
                <button onclick="confirmMeal()" class="w-full mt-4 bg-[#6750A4] text-white py-3 rounded-xl font-bold">AÑADIR</button>
            </div>
        </div>

        <div id="settings-screen" class="hidden absolute inset-0 bg-white z-50 flex flex-col p-6 overflow-y-auto">
             <div class="flex justify-between mb-6"><h2 class="text-xl font-bold">Perfil</h2><button onclick="closeSettings()" class="material-symbols-outlined">close</button></div>
             <input type="password" id="api-key" class="w-full p-3 border rounded-xl mb-4" placeholder="Gemini API Key">
             <button onclick="saveProfile()" class="w-full bg-[#6750A4] text-white py-4 rounded-2xl font-bold">GUARDAR Y CALCULAR</button>
        </div>

        <nav class="absolute bottom-0 w-full bg-[#F3EDF7] pt-3 border-t">
            <div class="absolute -top-10 left-1/2 -translate-x-1/2">
                <button onclick="openScan()" class="w-16 h-16 bg-[#D0BCFF] rounded-2xl shadow-xl flex items-center justify-center"><span class="material-symbols-outlined text-[32px]">photo_camera</span></button>
            </div>
            <div class="flex justify-around items-center px-4 pb-4">
                <button onclick="closeSettings(); closeScan();"><span class="material-symbols-outlined">home</span></button>
                <div class="w-12"></div>
                <button onclick="openSettings()"><span class="material-symbols-outlined">analytics</span></button>
            </div>
        </nav>
    </div>

    <script>
        let state = {
            profile: JSON.parse(localStorage.getItem('recomp_p')) || { name: "Usuario", weight: 75, height: 175, age: 25, goal: 'recomp', activity: 1.55, apiKey: "", targets: { cal: 2100, prot: 165, carb: 200, fat: 60 } },
            meals: JSON.parse(localStorage.getItem('recomp_m')) || []
        };

        // Cargar API Key al iniciar
        document.getElementById('api-key').value = state.profile.apiKey;

        function saveProfile() {
            state.profile.apiKey = document.getElementById('api-key').value;
            localStorage.setItem('recomp_p', JSON.stringify(state.profile));
            alert("Configuración guardada correctamente");
            closeSettings();
        }

        async function runAiAnalysis() {
            const input = document.getElementById('ai-input').value;
            const apiKey = state.profile.apiKey;
            if(!apiKey) { alert("¡Necesitas una API Key en el Perfil!"); return; }
            
            document.getElementById('loading-ai').classList.remove('hidden');
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Analiza: "${input}". Devuelve JSON: {"name": "...", "cal": 0, "prot": 0, "carb": 0, "fat": 0}` }] }] })
                });
                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, "").trim();
                const res = JSON.parse(jsonText);
                state.currentScan = res;
                document.getElementById('result-name').innerText = res.name + " (" + res.cal + " kcal)";
                document.getElementById('ai-result').classList.remove('hidden');
            } catch (e) { alert("Error al conectar con Gemini, revisa tu API Key"); }
            document.getElementById('loading-ai').classList.add('hidden');
        }

        function confirmMeal() {
            state.meals.push(state.currentScan);
            localStorage.setItem('recomp_m', JSON.stringify(state.meals));
            alert("Comida añadida");
            closeScan();
        }

        function openScan() { document.getElementById('scan-screen').classList.remove('hidden'); }
        function closeScan() { document.getElementById('scan-screen').classList.add('hidden'); }
        function openSettings() { document.getElementById('settings-screen').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-screen').classList.add('hidden'); }
    </script>
</body>
</html>
